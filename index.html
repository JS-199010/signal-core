<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 合約信號站 | BTC · ETH · SOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1520;
    --border: #1a2a3a;
    --accent: #00e5ff;
    --green: #00ff88;
    --red: #ff3b5c;
    --yellow: #ffd166;
    --muted: #3a5068;
    --text: #c8dce8;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.015) 2px, rgba(0,229,255,0.015) 4px);
    pointer-events: none;
    z-index: 999;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }

  .logo {
    display: flex;
    flex-direction: column;
  }

  .logo-title {
    font-family: var(--mono);
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .logo-sub {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 2px;
  }

  .status-bar {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
  }

  .status-dot.live {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* Config Panel */
  .config-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .config-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .config-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .config-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .config-input {
    width: 100%;
    background: rgba(0,229,255,0.05);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,255,0.1);
  }

  select.config-input option {
    background: var(--surface);
  }

  /* Analyze Button */
  .analyze-btn {
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 1rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    margin-bottom: 24px;
  }

  .analyze-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: -1;
  }

  .analyze-btn:hover {
    color: var(--bg);
    box-shadow: 0 0 30px rgba(0,229,255,0.3);
  }

  .analyze-btn:hover::before {
    transform: translateX(0);
  }

  .analyze-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Market Cards */
  .markets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .market-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .market-card.long {
    border-color: rgba(0,255,136,0.4);
    box-shadow: 0 0 20px rgba(0,255,136,0.08);
  }

  .market-card.short {
    border-color: rgba(255,59,92,0.4);
    box-shadow: 0 0 20px rgba(255,59,92,0.08);
  }

  .market-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .market-symbol {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: #fff;
    letter-spacing: 2px;
  }

  .market-price {
    font-family: var(--mono);
    font-size: 1.4rem;
    color: var(--accent);
  }

  .signal-badge {
    padding: 4px 14px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: bold;
    letter-spacing: 2px;
  }

  .signal-badge.long {
    background: rgba(0,255,136,0.15);
    color: var(--green);
    border: 1px solid rgba(0,255,136,0.3);
  }

  .signal-badge.short {
    background: rgba(255,59,92,0.15);
    color: var(--red);
    border: 1px solid rgba(255,59,92,0.3);
  }

  .signal-badge.neutral {
    background: rgba(255,209,102,0.15);
    color: var(--yellow);
    border: 1px solid rgba(255,209,102,0.3);
  }

  .signal-badge.loading {
    background: rgba(58,80,104,0.3);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .market-body {
    padding: 16px 20px;
  }

  /* Stats grid */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }

  .stat-item {
    background: rgba(0,0,0,0.2);
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 2px;
    display: block;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 0.9rem;
    color: var(--text);
  }

  .stat-value.up { color: var(--green); }
  .stat-value.down { color: var(--red); }

  /* Trade levels */
  .trade-levels {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .level-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-radius: 5px;
    background: rgba(0,0,0,0.15);
  }

  .level-row.entry { border-left: 2px solid var(--accent); }
  .level-row.sl { border-left: 2px solid var(--red); }
  .level-row.tp { border-left: 2px solid var(--green); }

  .level-name {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .level-value {
    font-family: var(--mono);
    font-size: 0.9rem;
    color: var(--text);
  }

  /* Analysis text */
  .analysis-text {
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--text);
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 4px;
    opacity: 0.85;
  }

  /* Skeleton loader */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, rgba(26,42,58,0.8) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    height: 16px;
    margin: 6px 0;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Log panel */
  .log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }

  .log-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 3px;
    margin-bottom: 10px;
  }

  .log-entries {
    max-height: 120px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  .log-entry {
    color: var(--muted);
    padding: 2px 0;
    border-bottom: 1px solid rgba(26,42,58,0.5);
  }

  .log-entry .ts { color: rgba(0,229,255,0.4); margin-right: 10px; }
  .log-entry .ok { color: var(--green); }
  .log-entry .err { color: var(--red); }
  .log-entry .info { color: var(--accent); }

  /* Email row */
  .email-row {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
  }

  .email-row .config-input {
    flex: 1;
  }

  /* Schedule */
  .schedule-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 10px;
  }

  .schedule-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: all 0.2s;
  }

  .schedule-toggle.active {
    border-color: var(--green);
    color: var(--green);
  }

  .schedule-toggle input {
    display: none;
  }

  .toggle-dot {
    width: 24px;
    height: 12px;
    border-radius: 6px;
    background: var(--border);
    position: relative;
    transition: background 0.2s;
  }

  .toggle-dot::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    background: var(--muted);
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: all 0.2s;
  }

  .schedule-toggle.active .toggle-dot {
    background: rgba(0,255,136,0.2);
  }

  .schedule-toggle.active .toggle-dot::after {
    background: var(--green);
    left: 14px;
  }

  /* Confidence bar */
  .confidence-bar-wrap {
    margin: 10px 0 6px;
  }

  .confidence-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .confidence-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }

  .confidence-fill.long { background: var(--green); }
  .confidence-fill.short { background: var(--red); }
  .confidence-fill.neutral { background: var(--yellow); }

  /* Responsive */
  @media (max-width: 600px) {
    .markets-grid { grid-template-columns: 1fr; }
    .config-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>

  <header>

      </div>
      <div class="market-body" id="body-ETH">

    <div class="market-card" id="card-SOL">
      <div class="market-header">
        <span class="market-symbol">◆ SOLUSDT</span>

      <div class="market-body" id="body-SOL">
        <div class="skeleton"></div>
        <div class="skeleton" style="width:70%"></div>
        <div class="skeleton" style="width:85%"></div>
      </div>
    </div>

</div>

<script>
// ── State ──────────────────────────────────────────────
let autoInterval = null;
let isAutoOn = false;
let nextRunTimeout = null;
let analysisResults = {};

// ── Logger ─────────────────────────────────────────────
function log(msg, type = '') {
  const container = document.getElementById('logEntries');
  const ts = new Date().toTimeString().slice(0,8);
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="ts">${ts}</span><span class="${type}">${msg}</span>`;
  container.prepend(div);
  if (container.children.length > 30) container.lastChild.remove();
}

// ── Binance Data ───────────────────────────────────────
async function fetchBinanceKlines(symbol, interval = '1h', limit = 100) {
  const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.map(k => ({
    t: new Date(k[0]).toISOString(),
    o: parseFloat(k[1]),
    h: parseFloat(k[2]),
    l: parseFloat(k[3]),
    c: parseFloat(k[4]),
    v: parseFloat(k[5])
  }));
}

async function fetchCurrentPrice(symbol) {
  const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
  const data = await res.json();
  return parseFloat(data.price);
}

// ── Indicator Calculations ─────────────────────────────
function calcSMA(closes, period) {
  const result = [];
  for (let i = 0; i < closes.length; i++) {
    if (i < period - 1) { result.push(null); continue; }
    const sum = closes.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0);
    result.push(+(sum / period).toFixed(6));
  }
  return result;
}

function calcEMA(closes, period) {
  const k = 2 / (period + 1);
  const result = [];
  for (let i = 0; i < closes.length; i++) {
    if (i === 0) { result.push(closes[0]); continue; }
    result.push(+(closes[i] * k + result[i - 1] * (1 - k)).toFixed(6));
  }
  return result;
}

function calcRSI(closes, period = 14) {
  const result = [];
  for (let i = 0; i < closes.length; i++) {
    if (i < period) { result.push(null); continue; }
    let gains = 0, losses = 0;
    for (let j = i - period + 1; j <= i; j++) {
      const diff = closes[j] - closes[j - 1];
      if (diff > 0) gains += diff; else losses += Math.abs(diff);
    }
    const rs = gains / (losses || 0.0001);
    result.push(+(100 - 100 / (1 + rs)).toFixed(2));
  }
  return result;
}

function calcMACD(closes) {
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  const macd = ema12.map((v, i) => v !== null && ema26[i] !== null ? +(v - ema26[i]).toFixed(6) : null);
  const signal = calcEMA(macd.filter(v => v !== null), 9);
  const hist = macd.slice(-signal.length).map((v, i) => v !== null ? +(v - signal[i]).toFixed(6) : null);
  const lastMacd = macd[macd.length - 1];
  const lastSignal = signal[signal.length - 1];
  const lastHist = hist[hist.length - 1];
  return { macd: lastMacd, signal: lastSignal, histogram: lastHist };
}

function calcBB(closes, period = 20, mult = 2) {
  const sma = calcSMA(closes, period);
  const last = closes.slice(-period);
  const mean = last.reduce((a, b) => a + b, 0) / period;
  const std = Math.sqrt(last.reduce((acc, v) => acc + Math.pow(v - mean, 2), 0) / period);
  return {
    upper: +(mean + mult * std).toFixed(2),
    middle: +(mean).toFixed(2),
    lower: +(mean - mult * std).toFixed(2)
  };
}

function calcATR(candles, period = 14) {
  const trs = candles.slice(1).map((c, i) => {
    const prev = candles[i];
    return Math.max(c.h - c.l, Math.abs(c.h - prev.c), Math.abs(c.l - prev.c));
  });
  return +(trs.slice(-period).reduce((a, b) => a + b, 0) / period).toFixed(4);
}

function calcVolumeTrend(candles, period = 10) {
  const recent = candles.slice(-period);
  const avg = recent.reduce((a, c) => a + c.v, 0) / period;
  const last = candles[candles.length - 1].v;
  return { avgVolume: +avg.toFixed(0), lastVolume: +last.toFixed(0), ratio: +(last / avg).toFixed(2) };
}

function buildSummary(symbol, klines, price) {
  const closes = klines.map(k => k.c);
  const sma20 = calcSMA(closes, 20);
  const ema50 = calcEMA(closes, 50);
  const ema200 = calcEMA(closes, 200);
  const rsi = calcRSI(closes, 14);
  const macd = calcMACD(closes);
  const bb = calcBB(closes, 20);
  const atr = calcATR(klines, 14);
  const vol = calcVolumeTrend(klines, 10);
  const lastRSI = rsi[rsi.length - 1];
  const lastSMA20 = sma20[sma20.length - 1];
  const lastEMA50 = ema50[ema50.length - 1];
  const lastEMA200 = ema200[ema200.length - 1];

  return {
    symbol,
    currentPrice: price,
    timeframe: document.getElementById('timeframe').value,
    indicators: {
      RSI14: lastRSI,
      SMA20: lastSMA20,
      EMA50: lastEMA50,
      EMA200: lastEMA200,
      MACD: macd,
      BollingerBands: bb,
      ATR14: atr,
      VolumeRatio: vol.ratio
    },
    recentCandles: klines.slice(-5).map(k => ({
      time: k.t,
      open: k.o, high: k.h, low: k.l, close: k.c, volume: k.v
    }))
  };
}

// ── Claude Analysis ────────────────────────────────────
async function analyzeWithClaude(summary, apiKey) {
  const prompt = `你是一位專業的加密貨幣合約交易分析師，精通技術分析與風險管理。

以下是 ${summary.symbol} 的市場數據（時間框架：${summary.timeframe}）：

**當前價格：** $${summary.currentPrice}

**技術指標：**
- RSI(14)：${summary.indicators.RSI14}
- SMA(20)：${summary.indicators.SMA20}
- EMA(50)：${summary.indicators.EMA50}
- EMA(200)：${summary.indicators.EMA200}
- MACD：值=${summary.indicators.MACD.macd?.toFixed(4)}，信號線=${summary.indicators.MACD.signal?.toFixed(4)}，柱狀圖=${summary.indicators.MACD.histogram?.toFixed(4)}
- 布林帶：上軌=${summary.indicators.BollingerBands.upper}，中軌=${summary.indicators.BollingerBands.middle}，下軌=${summary.indicators.BollingerBands.lower}
- ATR(14)：${summary.indicators.ATR14}
- 成交量比率（最新/均量）：${summary.indicators.VolumeRatio}x

**最近5根K棒：**
${summary.recentCandles.map(c => `- ${c.time.slice(0,16)} | 開:${c.open} 高:${c.high} 低:${c.low} 收:${c.close} 量:${c.volume.toFixed(0)}`).join('\n')}

請根據以上數據，用 JSON 格式回應，不要加任何其他文字：

{
  "signal": "LONG" 或 "SHORT" 或 "NEUTRAL",
  "confidence": 0-100之間的數字,
  "entry": 建議進場價格（數字）,
  "stopLoss": 建議止損價格（數字）,
  "takeProfit1": 第一目標價（數字）,
  "takeProfit2": 第二目標價（數字）,
  "leverage": 建議槓桿倍數（整數，1-20）,
  "summary": "50字以內的中文分析摘要",
  "keyReason": "進場的核心理由（20字）",
  "risk": "LOW" 或 "MEDIUM" 或 "HIGH"
}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 800,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || 'Claude API 錯誤');
  }

  const data = await response.json();
  const text = data.content[0].text.trim();
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ── Render Card ────────────────────────────────────────
function renderCard(symbol, price, analysis) {
  const card = document.getElementById(`card-${symbol}`);
  const badge = document.getElementById(`badge-${symbol}`);
  const priceEl = document.getElementById(`price-${symbol}`);
  const body = document.getElementById(`body-${symbol}`);

  const sig = analysis.signal;
  const sigClass = sig === 'LONG' ? 'long' : sig === 'SHORT' ? 'short' : 'neutral';
  const sigText = sig === 'LONG' ? '▲ LONG' : sig === 'SHORT' ? '▼ SHORT' : '◆ NEUTRAL';

  // Format price
  const fmt = (n) => n > 1000 ? n.toLocaleString('en-US', {maximumFractionDigits: 2})
    : n > 10 ? n.toFixed(2) : n.toFixed(4);

  priceEl.textContent = '$' + fmt(price);
  badge.className = `signal-badge ${sigClass}`;
  badge.textContent = sigText;
  card.className = `market-card ${sigClass}`;

  body.innerHTML = `
    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-label">信心指數</span>
        <span class="stat-value ${analysis.confidence >= 70 ? (sigClass === 'long' ? 'up' : 'down') : ''}">${analysis.confidence}%</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">建議槓桿</span>
        <span class="stat-value">${analysis.leverage}x</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">風險等級</span>
        <span class="stat-value ${analysis.risk === 'HIGH' ? 'down' : analysis.risk === 'LOW' ? 'up' : ''}">${analysis.risk}</span>
      </div>
    </div>

    <div class="confidence-bar-wrap">
      <div class="confidence-label"><span>信心度</span><span>${analysis.confidence}%</span></div>
      <div class="confidence-track">
        <div class="confidence-fill ${sigClass}" style="width:${analysis.confidence}%"></div>
      </div>
    </div>

    <div class="trade-levels">
      <div class="level-row entry">
        <span class="level-name">ENTRY</span>
        <span class="level-value">$${fmt(analysis.entry)}</span>
      </div>
      <div class="level-row sl">
        <span class="level-name">STOP LOSS</span>
        <span class="level-value" style="color:var(--red)">$${fmt(analysis.stopLoss)}</span>
      </div>
      <div class="level-row tp">
        <span class="level-name">TP1</span>
        <span class="level-value" style="color:var(--green)">$${fmt(analysis.takeProfit1)}</span>
      </div>
      <div class="level-row tp">
        <span class="level-name">TP2</span>
        <span class="level-value" style="color:var(--green)">$${fmt(analysis.takeProfit2)}</span>
      </div>
    </div>

    <div class="analysis-text">💡 ${analysis.summary}</div>
  `;
}

// ── Email ──────────────────────────────────────────────
async function sendEmail(results) {
  const serviceId = document.getElementById('emailjsServiceId').value.trim();
  const templateId = document.getElementById('emailjsTemplateId').value.trim();
  const publicKey = document.getElementById('emailjsPublicKey').value.trim();
  const toEmail = document.getElementById('targetEmail').value.trim();

  if (!serviceId || !templateId || !publicKey || !toEmail) {
    log('Email 設定不完整，跳過發送', 'info');
    return;
  }

  emailjs.init(publicKey);

  const signals = Object.entries(results).map(([sym, r]) =>
    `${sym}: ${r.analysis.signal} | Entry: $${r.analysis.entry} | SL: $${r.analysis.stopLoss} | TP1: $${r.analysis.takeProfit1} | 信心: ${r.analysis.confidence}%`
  ).join('\n');

  const hasStrong = Object.values(results).some(r => r.analysis.confidence >= 70 && r.analysis.signal !== 'NEUTRAL');
  const subject = hasStrong
    ? `🔥 [SIGNAL_CORE] 強烈信號！${new Date().toLocaleString('zh-TW')}`
    : `📊 [SIGNAL_CORE] 市場分析報告 ${new Date().toLocaleString('zh-TW')}`;

  const body = `SIGNAL_CORE AI 分析報告\n時間：${new Date().toLocaleString('zh-TW')}\n\n${signals}\n\n請登入 Signal Core 查看詳細圖表。`;

  try {
    await emailjs.send(serviceId, templateId, {
      to_email: toEmail,
      subject: subject,
      message: body
    });
    log('✉ 信號郵件已發送至 ' + toEmail, 'ok');
  } catch (e) {
    log('Email 發送失敗：' + e.text, 'err');
  }
}

// ── Main Analysis ──────────────────────────────────────
async function runAnalysis() {
  const apiKey = document.getElementById('claudeKey').value.trim();
  if (!apiKey) { log('請輸入 Claude API Key', 'err'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '⟳ 分析中...';

  document.getElementById('liveDot').className = 'status-dot live';
  document.getElementById('liveStatus').querySelector('.status-dot').nextSibling.textContent = 'SCANNING';

  const symbols = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT'];
  const shortNames = ['BTC', 'ETH', 'SOL'];
  const timeframe = document.getElementById('timeframe').value;

  for (let i = 0; i < symbols.length; i++) {
    const sym = symbols[i];
    const short = shortNames[i];
    log(`取得 ${sym} K線數據...`, 'info');

    try {
      const [klines, price] = await Promise.all([
        fetchBinanceKlines(sym, timeframe, 200),
        fetchCurrentPrice(sym)
      ]);

      document.getElementById(`price-${short}`).textContent = '$' + (price > 1000
        ? price.toLocaleString('en-US', {maximumFractionDigits: 2}) : price.toFixed(4));

      log(`計算 ${short} 技術指標...`, 'info');
      const summary = buildSummary(sym, klines, price);

      log(`呼叫 Claude 分析 ${short}...`, 'info');
      const analysis = await analyzeWithClaude(summary, apiKey);

      analysisResults[short] = { price, analysis };
      renderCard(short, price, analysis);
      log(`${short} 分析完成 → ${analysis.signal} (${analysis.confidence}%)`, 'ok');

    } catch (e) {
      log(`${short} 錯誤：${e.message}`, 'err');
      document.getElementById(`badge-${short}`).textContent = 'ERROR';
    }
  }

  // Send email
  if (Object.keys(analysisResults).length > 0) {
    await sendEmail(analysisResults);
  }

  btn.disabled = false;
  btn.textContent = '▶ 執行 AI 分析';
  document.getElementById('liveDot').className = 'status-dot';
  document.getElementById('liveStatus').querySelector('.status-dot').nextSibling.textContent = 'STANDBY';
  document.getElementById('lastRunTime').textContent = '上次：' + new Date().toLocaleTimeString('zh-TW');
}

// ── Auto Schedule ──────────────────────────────────────
function toggleAuto() {
  const toggle = document.getElementById('autoToggle');
  isAutoOn = !isAutoOn;
  toggle.classList.toggle('active', isAutoOn);

  if (isAutoOn) {
    log('已啟動自動掃描（每小時）', 'ok');
    autoInterval = setInterval(runAnalysis, 60 * 60 * 1000);
    updateNextRun();
  } else {
    clearInterval(autoInterval);
    clearTimeout(nextRunTimeout);
    document.getElementById('nextRunLabel').style.display = 'none';
    log('自動掃描已停止', 'info');
  }
}

function updateNextRun() {
  const label = document.getElementById('nextRunLabel');
  label.style.display = 'inline';
  let secs = 3600;
  const tick = () => {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    label.textContent = `下次: ${m}:${String(s).padStart(2,'0')}`;
    if (secs > 0) { secs--; nextRunTimeout = setTimeout(tick, 1000); }
    else updateNextRun();
  };
  tick();
}
